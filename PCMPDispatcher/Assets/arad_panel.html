</svg>
        </div>
    </div>
    <div class="bar">
        <span class="lbl">SCH&nbsp;Ⅰ</span>
        <input type="range" class="slider" id="slider" min="0" max="1000" value="0">
        <span class="lbl">SCH&nbsp;Ⅱ · GLOGOVAT&nbsp;&gt;</span>
        <span class="hint" id="hint"></span>
    </div>
</div>

<script>
// ═══ Switch geometry: cx,cy = centre; px,py = direction pointer ═══
const SWP_I = {
    A31: {cx:514,  cy:353, px:457,  py:313},
    A30: {cx:578,  cy:393, px:514,  py:353},
    A29: {cx:694,  cy:393, px:502,  py:273},
    A28: {cx:764,  cy:393, px:826,  py:433},
    A27: {cx:826,  cy:433, px:764,  py:393},
    A26: {cx:748,  cy:433, px:682,  py:473},
    A25: {cx:682,  cy:473, px:748,  py:433},
    A24: {cx:764,  cy:513, px:698,  py:553},
    A23: {cx:882,  cy:513, px:943,  py:473},
    A22: {cx:943,  cy:473, px:882,  py:513},
    A21: {cx:1046, cy:473, px:983,  py:433},
    A20: {cx:983,  cy:433, px:1046, py:473},
    A19: {cx:983,  cy:393, px:1046, py:353},
    A18: {cx:1046, cy:353, px:983,  py:393},
    A17: {cx:1090, cy:433, px:1155, py:393},
    A16: {cx:1155, cy:393, px:1090, py:433},
    A15: {cx:1113, cy:473, px:1175, py:513},
    A14: {cx:1327, cy:313, px:1263, py:353},
    A13: {cx:1175, cy:513, px:1113, py:473},
    A12: {cx:1262, cy:513, px:1322, py:553},
};
const SWP_II = {
    A7:  {cx:687,  cy:323, px:753,  py:363},
    A6:  {cx:753,  cy:363, px:687,  py:323},
    A4:  {cx:835,  cy:363, px:901,  py:403},
    A11: {cx:438,  cy:403, px:497,  py:363},
    A5:  {cx:753,  cy:403, px:687,  py:443},
    A3:  {cx:901,  cy:403, px:835,  py:363},
    A2:  {cx:948,  cy:403, px:1248, py:268},
    A1:  {cx:1021, cy:403, px:1321, py:268},
    A9:  {cx:503,  cy:443, px:438,  py:483},
    A8:  {cx:687,  cy:443, px:753,  py:403},
    A10: {cx:438,  cy:483, px:503,  py:443},
};
const SWP = Object.assign({}, SWP_I, SWP_II);

const igOf = {};
Object.keys(SWP_I ).forEach(id => igOf[id] = "ig-i");
Object.keys(SWP_II).forEach(id => igOf[id] = "ig-ii");

// Compute indicator arm endpoints (L=35) from pointer direction
const L = 35;
const SW = {};
Object.keys(SWP).forEach(id => {
    const d = SWP[id];
    const vx = d.px - d.cx, vy = d.py - d.cy, m = Math.hypot(vx, vy);
    const sxSign = d.px > d.cx ? 1 : -1;
    SW[id] = {
        cx: d.cx, cy: d.cy,
        sx: d.cx + L * sxSign, sy: d.cy,
        dx: Math.round((d.cx + L * vx / m) * 10) / 10,
        dy: Math.round((d.cy + L * vy / m) * 10) / 10
    };
});

const pos  = {}, inds = {};
Object.keys(SW).forEach(id => pos[id] = 0);

// Build indicator lines into the appropriate layer group
function buildInds(dict, groupId) {
    const g = document.getElementById(groupId);
    Object.keys(dict).forEach(id => {
        const d = SW[id];
        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", d.cx); l.setAttribute("y1", d.cy);
        l.setAttribute("x2", d.sx); l.setAttribute("y2", d.sy);
        l.setAttribute("stroke",          "#cc0000");
        l.setAttribute("stroke-width",    "4");
        l.setAttribute("stroke-linecap",  "round");
        l.setAttribute("class",           "ind");
        g.appendChild(l);
        inds[id] = l;
    });
}
buildInds(SWP_I,  "ig-i");
buildInds(SWP_II, "ig-ii");

function applySwitch(id) {
    const d = SW[id];
    inds[id].setAttribute("x2", pos[id] === 0 ? d.sx : d.dx);
    inds[id].setAttribute("y2", pos[id] === 0 ? d.sy : d.dy);
}

// ═══ Public API (polled by C# MapView every 500 ms) ═══
window.setSwitch = function(id, state) { if (!SW[id]) return; pos[id] = state ? 1 : 0; applySwitch(id); };
window.getSwitch = function(id)        { return pos[id] || 0; };
window.getAllSwitches = function()      { return pos; };

let _lastConsistClick = null;
window.getAndClearConsistClick = function() { const r = _lastConsistClick; _lastConsistClick = null; return r || null; };
let _consistMode = false;
window.setConsistMode = function(on) { _consistMode = on; };

// ═══ Coordinate helpers ═══
// SCH I  (x=0,y=0):    outer = local
// SCH II (x=1506,y=-10): outer_x = local+1506, outer_y = local-10
const SCH1_IDS = new Set(Object.keys(SWP_I));
function toOuter(id, d) {
    if (SCH1_IDS.has(id))
        return { cx: d.cx,        cy: d.cy,       sx: d.sx,        sy: d.sy,
                 dx: d.dx,        dy: d.dy };
    return     { cx: d.cx + 1506, cy: d.cy - 10,  sx: d.sx + 1506, sy: d.sy - 10,
                 dx: d.dx + 1506, dy: d.dy - 10 };
}

// ═══ Route point list in outer coordinates ═══
function routePoints(ids) {
    const pts = [];
    for (let i = 0; i < ids.length; i++) {
        const id = ids[i], d = SW[id];
        if (!d) continue;
        const o = toOuter(id, d), st = pos[id] || 0;
        pts.push([o.cx, o.cy]);
        if (i < ids.length - 1) {
            const nid = ids[i + 1], nd = SW[nid];
            if (!nd) continue;
            const no = toOuter(nid, nd);
            const ex = st === 0 ? o.sx : o.dx, ey = st === 0 ? o.sy : o.dy;
            const eDY = ey - o.cy;
            if (Math.abs(no.cy - o.cy) > 0.1) {
                let added = false;
                if (Math.abs(eDY) > 0.1) {
                    const t = (no.cy - o.cy) / eDY;
                    if (t > 0) {
                        const jx = o.cx + t * (ex - o.cx);
                        if ((jx - o.cx) * (no.cx - o.cx) >= -1) { pts.push([jx, no.cy]); added = true; }
                    }
                }
                if (!added) {
                    for (let bSt = 0; bSt <= 1 && !added; bSt++) {
                        const bEx = bSt === 0 ? no.sx : no.dx, bEy = bSt === 0 ? no.sy : no.dy;
                        const bDY = bEy - no.cy;
                        if (Math.abs(bDY) > 0.1) {
                            const tb = (o.cy - no.cy) / bDY;
                            if (tb > 0) { pts.push([no.cx + tb * (bEx - no.cx), o.cy]); added = true; }
                        }
                    }
                }
            }
        }
    }
    return pts;
}

// ═══ Route drawing — split outer points across the two SVG panels ═══
// Split boundary: x=1506; SCH I: outer y = local y; SCH II: local y = outer y + 10
const SPLIT_X = 1506, S2_Y = 10;
function drawRoute(pts, col) {
    if (pts.length < 2) return;
    const lI  = document.getElementById("route-layer-i");
    const lII = document.getElementById("route-layer-ii");
    const pI = [], pII = [];
    for (let i = 0; i < pts.length; i++) {
        const [x, y] = pts[i];
        if (x <= SPLIT_X) pI.push([x, y]);
        else               pII.push([x - SPLIT_X, y + S2_Y]);
        if (i < pts.length - 1) {
            const [nx, ny] = pts[i + 1];
            if ((x <= SPLIT_X) !== (nx <= SPLIT_X)) {
                const t = (SPLIT_X - x) / (nx - x), iy = y + t * (ny - y);
                pI.push([SPLIT_X, iy]);
                pII.push([0, iy + S2_Y]);
            }
        }
    }
    function poly(layer, arr) {
        if (arr.length < 2) return;
        const pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        pl.setAttribute("points", arr.map(p => p[0] + "," + p[1]).join(" "));
        pl.setAttribute("stroke", col); pl.setAttribute("stroke-width", "5");
        pl.setAttribute("fill", "none"); pl.setAttribute("stroke-linecap", "round");
        pl.setAttribute("stroke-linejoin", "round"); pl.setAttribute("opacity", "0.85");
        layer.appendChild(pl);
    }
    poly(lI, pI); poly(lII, pII);
}

window.clearRoute = function() {
    document.getElementById("route-layer-i").innerHTML  = "";
    document.getElementById("route-layer-ii").innerHTML = "";
    Object.keys(inds).forEach(id => {
        inds[id].setAttribute("stroke",       "#cc0000");
        inds[id].setAttribute("stroke-width", "4");
    });
};

window.buildRoute = function(ids, color) {
    window.clearRoute();
    if (!ids || ids.length < 2) return;
    drawRoute(routePoints(ids), color || "#00ff55");
    ids.forEach(id => { if (inds[id]) inds[id].setAttribute("stroke", "#aaff00"); });
};

window.addRoute = function(ids, color) {
    if (!ids || ids.length < 2) return;
    drawRoute(routePoints(ids), color || "#00dd55");
    ids.forEach(id => { if (inds[id]) inds[id].setAttribute("stroke", "#aaff00"); });
};

window.setSignal = function(id, state) {
    const el = document.getElementById("sig-" + id);
    if (!el) return;
    el.setAttribute("fill", (["#ff2020", "#ffcc00", "#00cc44"][state]) ?? "#ff2020");
};

window.highlightSwitch = function(id, on) {
    if (!inds[id]) return;
    inds[id].setAttribute("stroke",       on ? "#aaff00" : "#cc0000");
    inds[id].setAttribute("stroke-width", on ? "6"       : "4");
};

const locked = new Set();
window.lockSwitch = function(id, on) {
    if (on) locked.add(id); else locked.delete(id);
    const el = document.getElementById("n-" + id);
    if (!el) return;
    el.style.cursor = on ? "not-allowed" : "pointer";
    el.setAttribute("stroke", on ? "#888888" : "#ff0000");
};

// ═══ Click handlers ═══
Object.keys(SW).forEach(id => {
    const el = document.getElementById("n-" + id);
    if (!el) return;
    el.style.cursor = "pointer";
    el.addEventListener("click", () => {
        if (_consistMode) { _lastConsistClick = id; return; }
        if (locked.has(id)) return;
        pos[id] ^= 1; applySwitch(id);
    });
});

// ═══ Pan + Zoom (Ctrl+wheel) ═══
// Strip height = zoomScale * viewport height; centred on midpoint of platforms
// Platforms span y≈291–553 in SCH I (viewBox 847px tall); centre ≈ y=422, fraction ≈ 0.498
const ASPECT   = 3012 / 847;
const L3_FRAC  = 310 / 847; // vertical anchor — above platform centre so map sits lower on screen

const viewport = document.getElementById("viewport");
const strip    = document.getElementById("strip");
const slider   = document.getElementById("slider");
const hint     = document.getElementById("hint");

let zoomScale = 0.65;
const ZOOM_MAX = 1.8, ZOOM_STEP = 0.08;

const svgBoard = strip.querySelector("svg.board");

function applyPan() {
    const W = viewport.clientWidth;
    const H = viewport.clientHeight;
    if (!W || !H) return;
    // Hard clamp: can't zoom out past "scheme fills viewport width"
    const zmin = W / (H * ASPECT);
    if (zoomScale < zmin) zoomScale = zmin;
    const sh = zoomScale * H;          // SVG height px
    const sw = sh * ASPECT;            // SVG width px  — always >= W
    const ov = sw - W;                 // overflow, always >= 0
    const panOff = (slider.value / 1000) * ov;
    // Set SVG size directly — bypasses all CSS/flex/aspect-ratio quirks
    svgBoard.style.width  = sw + "px";
    svgBoard.style.height = sh + "px";
    strip.style.top       = (H / 2 - L3_FRAC * sh) + "px";
    strip.style.transform = "translateX(" + (-panOff) + "px)";
    hint.textContent = ov > 2 ? Math.round(slider.value / 10) + "%" : "вся схема видна";
}

slider.addEventListener("input", applyPan);
window.addEventListener("resize", applyPan);

let dragging = false, startX = 0, startVal = 0;
viewport.addEventListener("pointerdown", e => {
    if (e.target.closest(".sw")) return;
    dragging = true; startX = e.clientX; startVal = +slider.value;
    viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove", e => {
    if (!dragging) return;
    const W = viewport.clientWidth, H = viewport.clientHeight;
    const ov = Math.max(0, zoomScale * H * ASPECT - W);
    if (ov <= 0) return;
    slider.value = Math.min(1000, Math.max(0, startVal + ((startX - e.clientX) / ov) * 1000));
    applyPan();
});
viewport.addEventListener("pointerup",     () => { dragging = false; });
viewport.addEventListener("pointercancel", () => { dragging = false; });
viewport.addEventListener("wheel", e => {
    if (e.ctrlKey) {
        e.preventDefault();
        const W = viewport.clientWidth, H = viewport.clientHeight;
        const zmin = W / (H * ASPECT);
        zoomScale = Math.min(ZOOM_MAX, Math.max(zmin, zoomScale + (e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP)));
        applyPan();
        return;
    }
    const W = viewport.clientWidth, H = viewport.clientHeight;
    const ov = Math.max(0, zoomScale * H * ASPECT - W);
    if (ov <= 0) return;
    const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (delta === 0) return;
    e.preventDefault();
    slider.value = Math.min(1000, Math.max(0, +slider.value + (delta / ov) * 1000));
    applyPan();
}, { passive: false });

window.addEventListener("load", () => setTimeout(applyPan, 60));
setTimeout(applyPan, 300);
</script>
</body>
</html>
