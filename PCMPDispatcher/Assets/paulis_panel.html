        <circle id="sig-RXIII" cx="905" cy="229" r="7" fill="#ff2020" stroke="#111111" stroke-width="2"/>
        <text x="894" y="233" font-size="13" font-weight="bold" fill="#111111" text-anchor="end">RXIII</text>

        <!-- XII / RXII — L2 track y=200 -->
        <circle id="sig-XII"  cx="445" cy="189" r="7" fill="#ff2020" stroke="#111111" stroke-width="2"/>

    <g fill="#fff" stroke="#f00" stroke-width="2.5">
        <circle id="n-P17" cx="125" cy="240" r="6" class="sw"/>
        <circle id="n-P16" cx="155" cy="200" r="6" class="sw"/>
        <circle id="n-P15" cx="265" cy="200" r="6" class="sw"/>
        <circle id="n-P14" cx="295" cy="240" r="6" class="sw"/>
        <circle id="n-P13" cx="395" cy="200" r="6" class="sw"/>
        <circle id="n-P12" cx="395" cy="240" r="6" class="sw"/>
        <circle id="n-P11" cx="465" cy="280" r="6" class="sw"/>
        <circle id="n-P10" cx="495" cy="320" r="6" class="sw"/>
        <circle id="n-P9"  cx="820" cy="320" r="6" class="sw"/>
        <circle id="n-P8"  cx="855" cy="280" r="6" class="sw"/>
        <circle id="n-P7"  cx="910" cy="160" r="6" class="sw"/>
        <circle id="n-P5"  cx="955" cy="200" r="6" class="sw"/>
        <circle id="n-P6"  cx="955" cy="240" r="6" class="sw"/>
        <circle id="n-P4"  cx="995" cy="200" r="6" class="sw"/>
        <circle id="n-P3"  cx="1030" cy="240" r="6" class="sw"/>
        <circle id="n-P2"  cx="1090" cy="240" r="6" class="sw"/>
        <circle id="n-P1"  cx="1125" cy="200" r="6" class="sw"/>
    </g>
    <g font-size="14" font-weight="bold" fill="#f00" pointer-events="none">
        <text x="130" y="260" text-anchor="middle">P17</text>
        <text x="165" y="192" text-anchor="middle">P16</text>
        <text x="250" y="192" text-anchor="middle">P15</text>
        <text x="310" y="258" text-anchor="middle">P14</text>
        <text x="380" y="192" text-anchor="middle">P13</text>
        <text x="380" y="258" text-anchor="middle">P12</text>
        <text x="450" y="275" text-anchor="middle">P11</text>
        <text x="478" y="337" text-anchor="end">P10</text>
        <text x="837" y="337" text-anchor="start">P9</text>
        <text x="845" y="272" text-anchor="middle">P8</text>
        <text x="895" y="155" text-anchor="middle">P7</text>
        <text x="975" y="195" text-anchor="middle">P5</text>
        <text x="975" y="258" text-anchor="middle">P6</text>
        <text x="1015" y="192" text-anchor="middle">P4</text>
        <text x="1050" y="258" text-anchor="middle">P3</text>

        <text x="1140" y="192" text-anchor="middle">P1</text>

</div>
<script>
const SW = {
    P17:{cx:125,cy:240,sx:160,sy:240,dx:146,dy:212},
    P16:{cx:155,cy:200,sx:120,sy:200,dx:134,dy:228},
    P15:{cx:265,cy:200,sx:300,sy:200,dx:286,dy:228},
    P14:{cx:295,cy:240,sx:260,sy:240,dx:274,dy:212},
    P13:{cx:395,cy:200,sx:430,sy:200,dx:421,dy:177},
    P12:{cx:395,cy:240,sx:430,sy:240,dx:421,dy:263},
    P11:{cx:465,cy:280,sx:500,sy:280,dx:486,dy:308},
    P10:{cx:495,cy:320,sx:460,sy:320,dx:474,dy:292},
    P9: {cx:820,cy:320,sx:855,sy:320,dx:843,dy:294},
    P8: {cx:855,cy:280,sx:820,sy:280,dx:832,dy:306},
    P7: {cx:910,cy:160,sx:945,sy:160,dx:936,dy:183},
    P5: {cx:955,cy:200,sx:920,sy:200,dx:929,dy:177},
    P6: {cx:955,cy:240,sx:920,sy:240,dx:929,dy:263},
    P4: {cx:995,cy:200,sx:1030,sy:200,dx:1018,dy:226},
    P3: {cx:1030,cy:240,sx:995,sy:240,dx:1007,dy:214},
    P2: {cx:1090,cy:240,sx:1125,sy:240,dx:1113,dy:214},
    P1: {cx:1125,cy:200,sx:1090,sy:200,dx:1102,dy:226},
};

const pos = {};
Object.keys(SW).forEach(id => pos[id] = 0);

const ig = document.getElementById("ig");
const inds = {};
Object.keys(SW).forEach(id => {
    const d = SW[id];
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",d.cx); l.setAttribute("y1",d.cy);
    l.setAttribute("x2",d.sx); l.setAttribute("y2",d.sy);
    l.setAttribute("stroke","#cc0000"); l.setAttribute("stroke-width","4");
    l.setAttribute("stroke-linecap","round"); l.setAttribute("class","ind");
    ig.appendChild(l); inds[id] = l;
});

// Public API for external control (called from C# via ExecuteScriptAsync)
window.setSwitch = function(id, state) {
    if (!SW[id]) return;
    pos[id] = state ? 1 : 0;
    const d = SW[id];
    inds[id].setAttribute("x2", pos[id]===0 ? d.sx : d.dx);
    inds[id].setAttribute("y2", pos[id]===0 ? d.sy : d.dy);
};

window.getSwitch = function(id) { return pos[id] || 0; };

window.buildRoute = function(ids, color) {
    const layer = document.getElementById("route-layer");
    layer.innerHTML = "";
    Object.keys(inds).forEach(id => inds[id].setAttribute("stroke","#cc0000"));
    if (!ids || ids.length < 2) return;
    const col = color || "#00ff55";
    const pts = [];
    for (let i = 0; i < ids.length; i++) {
        const d = SW[ids[i]], st = pos[ids[i]] || 0;
        if (!d) continue;
        pts.push([d.cx, d.cy]);
        if (i < ids.length - 1) {
            const nid = ids[i+1], nd = SW[nid], stB = pos[nid] || 0;
            if (!nd) continue;
            const ex = st===0?d.sx:d.dx, ey = st===0?d.sy:d.dy;
            const eDY = ey - d.cy;
            if (Math.abs(nd.cy - d.cy) > 0.1) {
                let added = false;
                // Try A exit direction → target Y (only if junction is toward destination)
                if (Math.abs(eDY) > 0.1) {
                    const t = (nd.cy - d.cy) / eDY;
                    if (t > 0) {
                        const jx = d.cx + t*(ex - d.cx);
                        if ((jx - d.cx) * (nd.cx - d.cx) >= -1) {
                            pts.push([jx, nd.cy]); added = true;
                        }
                    }
                }
                // Fallback: try both B states to find diagonal junction at A's Y
                if (!added) {
                    for (let bSt = 0; bSt <= 1 && !added; bSt++) {
                        const bEx = bSt===0?nd.sx:nd.dx, bEy = bSt===0?nd.sy:nd.dy;
                        const bDY = bEy - nd.cy;
                        if (Math.abs(bDY) > 0.1) {
                            const tb = (d.cy - nd.cy) / bDY;
                            if (tb > 0) {
                                pts.push([nd.cx + tb*(bEx-nd.cx), d.cy]);
                                added = true;
                            }
                        }
                    }
                }
            }
        }
    }
    const pl = document.createElementNS("http://www.w3.org/2000/svg","polyline");
    pl.setAttribute("points", pts.map(p=>p[0]+","+p[1]).join(" "));
    pl.setAttribute("stroke", col);
    pl.setAttribute("stroke-width","5");
    pl.setAttribute("fill","none");
    pl.setAttribute("stroke-linecap","round");
    pl.setAttribute("stroke-linejoin","round");
    pl.setAttribute("opacity","0.85");
    layer.appendChild(pl);
    ids.forEach(id => { if(inds[id]) inds[id].setAttribute("stroke","#aaff00"); });
};

// Polling API — C# reads state via ExecuteScriptAsync
window.getAllSwitches = function() { return pos; };
let _lastConsistClick = null;
window.getAndClearConsistClick = function() { var r = _lastConsistClick; _lastConsistClick = null; return r || null; };

// addRoute — draws on top of existing routes (no clear)
window.addRoute = function(ids, color) {
    const layer = document.getElementById("route-layer");
    if (!ids || ids.length < 2) return;
    const col = color || "#00dd55";
    const pts = [];
    for (let i = 0; i < ids.length; i++) {
        const d = SW[ids[i]], st = pos[ids[i]] || 0;
        if (!d) continue;
        pts.push([d.cx, d.cy]);
        if (i < ids.length - 1) {
            const nid = ids[i+1], nd = SW[nid];
            if (!nd) continue;
            const ex = st===0?d.sx:d.dx, ey = st===0?d.sy:d.dy;
            const eDY = ey - d.cy;
            if (Math.abs(nd.cy - d.cy) > 0.1) {
                let added = false;
                if (Math.abs(eDY) > 0.1) {
                    const t = (nd.cy - d.cy) / eDY;
                    if (t > 0) {
                        const jx = d.cx + t*(ex - d.cx);
                        if ((jx - d.cx) * (nd.cx - d.cx) >= -1) { pts.push([jx, nd.cy]); added = true; }
                    }
                }
                if (!added) {
                    for (let bSt = 0; bSt <= 1 && !added; bSt++) {
                        const bEx = bSt===0?nd.sx:nd.dx, bEy = bSt===0?nd.sy:nd.dy;
                        const bDY = bEy - nd.cy;
                        if (Math.abs(bDY) > 0.1) {
                            const tb = (d.cy - nd.cy) / bDY;
                            if (tb > 0) { pts.push([nd.cx + tb*(bEx-nd.cx), d.cy]); added = true; }
                        }
                    }
                }
            }
        }
    }
    const pl = document.createElementNS("http://www.w3.org/2000/svg","polyline");
    pl.setAttribute("points", pts.map(p=>p[0]+","+p[1]).join(" "));
    pl.setAttribute("stroke", col);
    pl.setAttribute("stroke-width","5");
    pl.setAttribute("fill","none");
    pl.setAttribute("stroke-linecap","round");
    pl.setAttribute("stroke-linejoin","round");
    pl.setAttribute("opacity","0.85");
    layer.appendChild(pl);
    ids.forEach(id => { if(inds[id]) inds[id].setAttribute("stroke","#aaff00"); });
};

window.setSignal = function(id, state) {
    const el = document.getElementById('sig-' + id);
    if (!el) return;
    const cols = ['#ff2020', '#ffcc00', '#00cc44'];
    el.setAttribute('fill', cols[state] ?? cols[0]);
};

window.clearRoute = function() {
    document.getElementById("route-layer").innerHTML = "";
    Object.keys(inds).forEach(id => inds[id].setAttribute("stroke","#cc0000"));
};

window.highlightSwitch = function(id, on) {
    if (!inds[id]) return;
    inds[id].setAttribute("stroke", on ? "#3458e1" : "#cc0000");
    inds[id].setAttribute("stroke-width", on ? "6" : "4");
};

const locked = new Set();
window.lockSwitch = function(id, on) {
    if (on) locked.add(id); else locked.delete(id);
    const el = document.getElementById("n-"+id);
    if (!el) return;
    el.style.cursor = on ? "not-allowed" : "pointer";
    el.setAttribute("stroke", on ? "#888888" : "#ff0000");
};

let consistMode = false;
window.setConsistMode = function(on) { consistMode = on; };

// Click handlers — allow toggling from HTML (respects lock + consistMode)
Object.keys(SW).forEach(id => {
    const el = document.getElementById("n-"+id);
    if (!el) return;
    el.style.cursor = "pointer";
    el.addEventListener("click", () => {
        if (locked.has(id)) return;
        if (consistMode) {
            _lastConsistClick = id;
            // In consist mode: also toggle the switch so dispatcher can set positions
            pos[id] ^= 1;
            const d = SW[id];
            inds[id].setAttribute("x2", pos[id]===0 ? d.sx : d.dx);
            inds[id].setAttribute("y2", pos[id]===0 ? d.sy : d.dy);
            return;
        }
        pos[id] ^= 1;
        const d = SW[id];
        inds[id].setAttribute("x2", pos[id]===0 ? d.sx : d.dx);
        inds[id].setAttribute("y2", pos[id]===0 ? d.sy : d.dy);
    });
});
</script>
</body>
</html>
