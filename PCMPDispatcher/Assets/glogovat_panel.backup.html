<script>
// ═══ Геометрия всех стрелок (обе горловины в одной системе) ═══
// cx,cy — центр кружка; sx,sy — конец остряка прямо (0); dx,dy — отклонено (1). Длина 35.
const SW_ARAD = {
    G26: {cx:231, cy:110, sx:266, sy:110, dx:261.9, dy:126.5},
    G25: {cx:306, cy:150, sx:271, sy:150, dx:275.1, dy:133.5},
    G24: {cx:364, cy:230, sx:399, sy:230, dx:391.9, dy:251.1},
    G23: {cx:431, cy:190, sx:466, sy:190, dx:458.5, dy:168.4},
    G22: {cx:482, cy:150, sx:447, sy:150, dx:454.5, dy:171.6},
    G21: {cx:537, cy:150, sx:572, sy:150, dx:564.5, dy:128.4},
    G20: {cx:588, cy:110, sx:553, sy:110, dx:560.5, dy:131.6},
    G17: {cx:696, cy:110, sx:731, sy:110, dx:726.1, dy:92.1},
    G18: {cx:697, cy:150, sx:732, sy:150, dx:727.9, dy:166.5},
    G19: {cx:772, cy:190, sx:737, sy:190, dx:741.1, dy:173.5},
    G16: {cx:861, cy:70, sx:896, sy:70, dx:889.3, dy:49.4},
    G15: {cx:926, cy:190, sx:961, sy:190, dx:955.4, dy:209},
    G13: {cx:988, cy:230, sx:953, sy:230, dx:958.6, dy:211},
    G12: {cx:1050, cy:230, sx:1015, sy:230, dx:1025.3, dy:254.7},
    G11: {cx:1104, cy:230, sx:1139, sy:230, dx:1131.3, dy:208.1},
    G10: {cx:1154, cy:190, sx:1119, sy:190, dx:1126.7, dy:211.9},
    G14: {cx:1010, cy:270, sx:975, sy:270, dx:983.3, dy:292.7},
};
const SW_GHIO = {
    G8: {cx:681,  cy:140, sx:646,  sy:140, dx:655,  dy:116},
    G7: {cx:792,  cy:180, sx:757,  sy:180, dx:766,  dy:156},
    G6: {cx:792,  cy:220, sx:757,  sy:220, dx:766,  dy:243},
    G9: {cx:570,  cy:260, sx:535,  sy:260, dx:544,  dy:283},
    G5: {cx:859,  cy:180, sx:894,  sy:180, dx:885,  dy:203},
    G4: {cx:903,  cy:220, sx:868,  sy:220, dx:877,  dy:196},
    G2: {cx:1034, cy:220, sx:1069, sy:220, dx:1055, dy:192},
    G1: {cx:1064, cy:180, sx:1029, sy:180, dx:1043, dy:208},
    G3: {cx:968.5, cy:220, sx:1003.5, sy:220, dx:993.7, dy:244.3},
};
const SW = Object.assign({}, SW_ARAD, SW_GHIO);

const pos = {};
const inds = {};
Object.keys(SW).forEach(id => pos[id] = 0);

function buildInds(dict, groupId) {
    const g = document.getElementById(groupId);
    Object.keys(dict).forEach(id => {
        const d = dict[id];
        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", d.cx); l.setAttribute("y1", d.cy);
        l.setAttribute("x2", d.sx); l.setAttribute("y2", d.sy);
        l.setAttribute("stroke", "#cc0000");
        l.setAttribute("stroke-width", "4");
        l.setAttribute("stroke-linecap", "round");
        l.setAttribute("class", "ind");
        g.appendChild(l);
        inds[id] = l;
    });
}
buildInds(SW_ARAD, "ig-arad");
buildInds(SW_GHIO, "ig-ghioroc");

function applySwitch(id) {
    const d = SW[id];
    inds[id].setAttribute("x2", pos[id] === 0 ? d.sx : d.dx);
    inds[id].setAttribute("y2", pos[id] === 0 ? d.sy : d.dy);
}

// ═══ Публичный API для C# (WebView2 ExecuteScriptAsync) ═══
window.setSwitch = function(id, state) { if (!SW[id]) return; pos[id] = state ? 1 : 0; applySwitch(id); };
window.getSwitch = function(id) { return pos[id] || 0; };
window.getAllSwitches = function() { return pos; };

// ═══ Consist click API ═══
let _lastConsistClick = null;
window.getAndClearConsistClick = function() { var r = _lastConsistClick; _lastConsistClick = null; return r || null; };
let _consistMode = false;
window.setConsistMode = function(on) { _consistMode = on; };

// ═══ Outer coordinate helpers (both panels unified) ═══
// Left SVG:  g translate(0,90), viewBox y-offset -20  → outer_cy = local_cy + 110
// Right SVG: x=1200, g translate(0,20), viewBox y-offset -20 → outer_cx = local_cx + 1200, outer_cy = local_cy + 40
const ARAD_IDS = new Set(Object.keys(SW_ARAD));
function toOuter(id, d) {
    return ARAD_IDS.has(id)
        ? { cx: d.cx,        cy: d.cy + 110, sx: d.sx,        sy: d.sy + 110, dx: d.dx,        dy: d.dy + 110 }
        : { cx: d.cx + 1200, cy: d.cy + 40,  sx: d.sx + 1200, sy: d.sy + 40,  dx: d.dx + 1200, dy: d.dy + 40  };
}

// ═══ Route point list in outer coordinate space (same algorithm as Paulis/Ghioroc) ═══
function routePoints(ids) {
    const pts = [];
    for (let i = 0; i < ids.length; i++) {
        const id = ids[i], d = SW[id];
        if (!d) continue;
        const o = toOuter(id, d), st = pos[id] || 0;
        pts.push([o.cx, o.cy]);
        if (i < ids.length - 1) {
            const nid = ids[i+1], nd = SW[nid];
            if (!nd) continue;
            const no = toOuter(nid, nd);

            // ── Hardcoded cross-panel topology (G16 ↔ G8) ──
            // G16 left (pos=1) + G8 right (pos=1) → route via L6 (outer y=140, upper dashed track)
            // G16 right (pos=0) + G8 left (pos=0) → route stays on L5 (outer y=180, straight)
            if ((id==="G16" && nid==="G8") || (id==="G8" && nid==="G16")) {
                if (pos.G16===1 && pos.G8===1) {
                    // Both deflected → upper L6 track
                    // G16 dashed end: local (916,30) → outer (916,140)
                    // G8  dashed end: local (637,100) → outer (1837,140)
                    if (id==="G16") { pts.push([916,140]); pts.push([1837,140]); }
                    else             { pts.push([1837,140]); pts.push([916,140]); }
                }
                // pos=0 both → centers already at outer y=180, straight line handled by default
                continue;
            }

            const ex = st===0 ? o.sx : o.dx, ey = st===0 ? o.sy : o.dy;
            const eDY = ey - o.cy;
            if (Math.abs(no.cy - o.cy) > 0.1) {
                let added = false;
                if (Math.abs(eDY) > 0.1) {
                    const t = (no.cy - o.cy) / eDY;
                    if (t > 0) {
                        const jx = o.cx + t * (ex - o.cx);
                        if ((jx - o.cx) * (no.cx - o.cx) >= -1) { pts.push([jx, no.cy]); added = true; }
                    }
                }
                if (!added) {
                    for (let bSt = 0; bSt <= 1 && !added; bSt++) {
                        const bEx = bSt===0 ? no.sx : no.dx, bEy = bSt===0 ? no.sy : no.dy;
                        const bDY = bEy - no.cy;
                        if (Math.abs(bDY) > 0.1) {
                            const tb = (o.cy - no.cy) / bDY;
                            if (tb > 0) { pts.push([no.cx + tb*(bEx - no.cx), o.cy]); added = true; }
                        }
                    }
                }
            }
        }
    }
    return pts;
}

// ═══ Route drawing — split outer points into per-panel layers ═══
function drawRoute(pts, col) {
    if (pts.length < 2) return;
    const layerL = document.getElementById("route-layer-left");
    const layerR = document.getElementById("route-layer-right");
    const leftPts = [], rightPts = [];
    for (let i = 0; i < pts.length; i++) {
        const [x, y] = pts[i];
        if (x > 1200) rightPts.push([x - 1200, y - 40]);
        else           leftPts.push([x,         y - 110]);
        if (i < pts.length - 1) {
            const [nx, ny] = pts[i+1];
            if ((x <= 1200 && nx > 1200) || (x > 1200 && nx <= 1200)) {
                const t = (1200 - x) / (nx - x), iy = y + t * (ny - y);
                leftPts.push([1200,      iy - 110]);
                rightPts.push([0,        iy - 40]);
            }
        }
    }
    function poly(layer, pArr) {
        if (pArr.length < 2) return;
        const pl = document.createElementNS("http://www.w3.org/2000/svg","polyline");
        pl.setAttribute("points", pArr.map(p=>p[0]+","+p[1]).join(" "));
        pl.setAttribute("stroke", col); pl.setAttribute("stroke-width","5");
        pl.setAttribute("fill","none"); pl.setAttribute("stroke-linecap","round");
        pl.setAttribute("stroke-linejoin","round"); pl.setAttribute("opacity","0.85");
        layer.appendChild(pl);
    }
    poly(layerL, leftPts);
    poly(layerR, rightPts);
}

window.clearRoute = function() {
    document.getElementById("route-layer-left").innerHTML  = "";
    document.getElementById("route-layer-right").innerHTML = "";
    Object.keys(inds).forEach(id => {
        inds[id].setAttribute("stroke","#cc0000");
        inds[id].setAttribute("stroke-width","4");
    });
};

window.buildRoute = function(ids, color) {
    window.clearRoute();
    if (!ids || ids.length < 2) return;
    const col = color || "#00ff55";
    drawRoute(routePoints(ids), col);
    ids.forEach(id => { if (inds[id]) inds[id].setAttribute("stroke","#aaff00"); });
};

window.addRoute = function(ids, color) {
    if (!ids || ids.length < 2) return;
    const col = color || "#00dd55";
    drawRoute(routePoints(ids), col);
    ids.forEach(id => { if (inds[id]) inds[id].setAttribute("stroke","#aaff00"); });
};

window.setSignal = function(id, state) {
    const el = document.getElementById('sig-' + id);
    if (!el) return;
    el.setAttribute('fill', ['#ff2020','#ffcc00','#00cc44'][state] ?? '#ff2020');
};

window.highlightSwitch = function(id, on) {
    if (!inds[id]) return;
    inds[id].setAttribute("stroke", on ? "#aaff00" : "#cc0000");
    inds[id].setAttribute("stroke-width", on ? "6" : "4");
};

const locked = new Set();
window.lockSwitch = function(id, on) {
    if (on) locked.add(id); else locked.delete(id);
    const el = document.getElementById("n-"+id);
    if (!el) return;
    el.style.cursor = on ? "not-allowed" : "pointer";
    el.setAttribute("stroke", on ? "#888888" : "#ff0000");
};

Object.keys(SW).forEach(id => {
    const el = document.getElementById("n-" + id);
    if (!el) return;
    el.style.cursor = "pointer";
    el.addEventListener("click", () => {
        if (_consistMode) { _lastConsistClick = id; return; }
        if (locked.has(id)) return;
        pos[id] ^= 1; applySwitch(id);
    });
});

// ═══ Ползунок панорамирования ═══
const viewport = document.getElementById("viewport");
const strip = document.getElementById("strip");
const slider = document.getElementById("slider");
const hint = document.getElementById("hint");
function maxPan() { return Math.max(0, strip.scrollWidth - viewport.clientWidth); }
function apply() {
    const frac = slider.value / 1000;
    strip.style.transform = "translateX(" + (-frac * maxPan()) + "px)";
    hint.textContent = maxPan() > 2 ? Math.round(frac * 100) + "%" : "вся схема видна";
}
slider.addEventListener("input", apply);
window.addEventListener("resize", apply);

let dragging = false, startX = 0, startVal = 0;
viewport.addEventListener("pointerdown", (e) => { if (e.target.closest(".sw")) return; dragging = true; startX = e.clientX; startVal = +slider.value; viewport.setPointerCapture(e.pointerId); });
viewport.addEventListener("pointermove", (e) => { if (!dragging) return; const mp = maxPan(); if (mp <= 0) return; const dv = ((startX - e.clientX) / mp) * 1000; slider.value = Math.min(1000, Math.max(0, startVal + dv)); apply(); });
viewport.addEventListener("pointerup", () => { dragging = false; });
viewport.addEventListener("pointercancel", () => { dragging = false; });
viewport.addEventListener("wheel", (e) => { const mp = maxPan(); if (mp <= 0) return; const delta = (Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY); if (delta === 0) return; e.preventDefault(); slider.value = Math.min(1000, Math.max(0, +slider.value + (delta / mp) * 1000)); apply(); }, { passive: false });

window.addEventListener("load", () => setTimeout(apply, 60));
setTimeout(apply, 300);
</script>
</body>
